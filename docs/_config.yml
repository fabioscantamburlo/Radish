title: "Radish"
description: "A didactical in-memory database inspired by Redis, built entirely in Julia"
baseurl: "/Radish"
url: ""

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Enable Mermaid diagrams
mermaid:
  version: "11"

# Footer
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/fabioscantamburlo/Radish"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Color scheme
color_scheme: radish

# Heading anchor links
heading_anchors: true

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

favicon_ico: "/Radish/assets/favicon.ico"

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
