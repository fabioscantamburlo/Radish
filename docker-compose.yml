services:
  radish-server:
    build: .
    image: radish
    container_name: radish-server
    ports:
      - "9000:9000"
    networks:
      - radish-net
    volumes:
      - radish-data:/app/persistence
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  radish-client:
    image: radish
    # Override the default command to run the client instead of the server
    # Connect to the server service name 'radish-server' on port 9000
    command: julia --project=. client_runner.jl radish-server 9000
    depends_on:
      radish-server:
        condition: service_healthy
    networks:
      - radish-net
    stdin_open: true  # docker run -i
    tty: true         # docker run -t
    profiles:
      - client

  radish-docs:
    image: ruby:3.3-slim
    container_name: radish-docs
    working_dir: /srv/jekyll
    environment:
      - BUNDLE_PATH=/usr/local/bundle
    command: >
      bash -c "
        apt-get update && apt-get install -y build-essential &&
        bundle install &&
        bundle exec jekyll serve --host 0.0.0.0 --force_polling
      "
    ports:
      - "4000:4000"
    volumes:
      - ./docs:/srv/jekyll
      - docs-gems:/usr/local/bundle
    profiles:
      - docs

networks:
  radish-net:
    driver: bridge

volumes:
  radish-data:
  docs-gems:
